<!DOCTYPE html>
<html>

<head>
    <title>2473031-Albertus Dimas Dwi Andriyanto</title>
    <style>
        body {
            padding: 20px;
        }

        table {
            border: 1px solid black;
            border-spacing: 3px;
        }

        td {
            border: 1px solid black;
            padding: 8px 12px;
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>

<body>

    <div id="hasil"></div>

    <script>
        function ambilInput() {
            let val;

            while (true) {
                val = prompt("A number?");
                if (val !== null && val.trim() !== "" && !isNaN(val)) {
                    return parseInt(val);
                }
            }
        }

        function buatBaris(i, angka) {
            return "<tr>" +
                "<td>" + i + "</td>" +
                "<td>x</td>" +
                "<td>" + angka + "</td>" +
                "<td>=</td>" +
                "<td>" + (i * angka) + "</td>" +
                "</tr>";
        }

        function generate() {
            let angka = ambilInput();
            let tabel = "<table>";

            for (let i = 1; i <= angka; i++) {
                tabel += buatBaris(i, angka);
            }

            tabel += "</table>";

            document.getElementById("hasil").innerHTML = tabel;
        }

        generate();
    </script>

</body>

</html>
